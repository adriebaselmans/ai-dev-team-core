version: 1
default_mode: one-shot

providers:
  mock:
    backend: mock
    options: {}
  openai:
    backend: openai_responses
    env:
      api_key: OPENAI_API_KEY
      base_url: OPENAI_BASE_URL
      organization: OPENAI_ORG_ID
      project: OPENAI_PROJECT_ID
    options:
      store: false
      reasoning_effort: low
      verbosity: medium
  github-copilot:
    backend: github_copilot_cli
    options:
      executable: copilot
      output_format: text
      silent: true
      no_ask_user: true
      no_custom_instructions: true
      no_auto_update: true
      stream: off
  anthropic:
    backend: mock
    options: {}
  ollama:
    backend: mock
    options: {}

roles:
  coordinator:
    provider: mock
    model: gpt-5.4
    mode: orchestrator
    placeholder: true
  requirements-engineer:
    provider: openai
    model: gpt-5.4-mini
    mode: one-shot
  ux-ui-designer:
    provider: openai
    model: gpt-5.4-mini
    mode: one-shot
  explorer:
    provider: openai
    model: gpt-5.4-mini
    mode: one-shot
  scout:
    provider: github-copilot
    model: gpt-5
    mode: one-shot
  architect:
    provider: openai
    model: gpt-5.4
    mode: one-shot
    options:
      reasoning_effort: medium
  developer:
    provider: openai
    model: gpt-5.4
    mode: one-shot
    options:
      reasoning_effort: medium
  reviewer:
    provider: openai
    model: gpt-5.4-mini
    mode: one-shot
  tester:
    provider: openai
    model: gpt-5.4-mini
    mode: one-shot
  dod-reviewer:
    provider: openai
    model: gpt-5.4-mini
    mode: one-shot
