version: 2
runtime: model-agnostic

phases:
  idle:
    owner: coordinator
    artifact: null
    context_slice: coordinator
  requirements:
    owner: requirements-engineer
    artifact: requirements
    context_slice: requirements-engineer
  architecture:
    owner: architect
    artifact: design
    context_slice: architect
  development:
    owner: developer
    artifact: null
    context_slice: developer
  review:
    owner: reviewer
    artifact: review
    context_slice: reviewer
  testing:
    owner: tester
    artifact: dod
    context_slice: tester
  dod-review:
    owner: coordinator
    artifact: dod
    context_slice: coordinator
  done:
    owner: coordinator
    artifact: null
    context_slice: coordinator

transitions:
  feature_received:
    from: idle
    to: requirements
    validators: []
  requirements_ready:
    from: requirements
    to: architecture
    validators:
      - requirements_artifact_ready
  design_ready:
    from: architecture
    to: development
    validators:
      - design_artifact_ready
  implementation_complete:
    from: development
    to: review
    validators:
      - development_outputs_present
  review_approved:
    from: review
    to: testing
    validators:
      - review_approved
  review_rework:
    from: review
    to: development
    validators:
      - review_rework_required
  testing_complete:
    from: testing
    to: dod-review
    validators:
      - dod_ready_for_user_review
  user_feedback:
    from: dod-review
    to: requirements
    validators: []
  user_approved:
    from: dod-review
    to: done
    validators: []
  reset:
    from: done
    to: idle
    validators: []

default_triggers:
  idle: feature_received
  requirements: requirements_ready
  architecture: design_ready
  development: implementation_complete
  review: review_approved
  testing: testing_complete
