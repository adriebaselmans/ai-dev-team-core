version: 2
runtime: model-agnostic

phases:
  idle:
    owner: coordinator
    artifact: null
    context_slice: coordinator
    canonical_source: state
  requirements:
    owner: requirements-engineer
    artifact: requirements
    context_slice: requirements-engineer
    canonical_source: artifacts
    collaboration:
      optional_partners:
        - role: ux-ui-designer
          purpose: clarify user flows, interaction expectations, accessibility constraints, and visual priorities when UI scope is material
  architecture:
    owner: architect
    artifact: design
    context_slice: architect
    canonical_source: artifacts
  development:
    owner: developer
    artifact: null
    context_slice: developer
    canonical_source: artifacts
  review:
    owner: reviewer
    artifact: review
    context_slice: reviewer
    canonical_source: artifacts
    collaboration:
      primary_partner:
        role: developer
        purpose: findings handling and rework coordination
  testing:
    owner: tester
    artifact: dod
    context_slice: tester
    canonical_source: artifacts
    collaboration:
      validates_with:
        - role: requirements-engineer
          purpose: acceptance criteria understanding and satisfaction
      consults_when_needed:
        - role: architect
          purpose: non-functional requirement validation or clarification
  dod-review:
    owner: coordinator
    artifact: dod
    context_slice: coordinator
    canonical_source: state
  done:
    owner: coordinator
    artifact: null
    context_slice: coordinator
    canonical_source: state

transitions:
  feature_received:
    from: idle
    to: requirements
    validators: []
  requirements_ready:
    from: requirements
    to: architecture
    validators:
      - requirements_artifact_ready
  design_ready:
    from: architecture
    to: development
    validators:
      - design_artifact_ready
  implementation_complete:
    from: development
    to: review
    validators:
      - development_outputs_present
  review_approved:
    from: review
    to: testing
    validators:
      - review_approved
  review_rework:
    from: review
    to: development
    validators:
      - review_rework_required
  testing_complete:
    from: testing
    to: dod-review
    validators:
      - dod_ready_for_user_review
  user_feedback:
    from: dod-review
    to: requirements
    validators: []
  user_approved:
    from: dod-review
    to: done
    validators: []
  reset:
    from: done
    to: idle
    validators: []

default_triggers:
  idle: feature_received
  requirements: requirements_ready
  architecture: design_ready
  development: implementation_complete
  review: review_approved
  testing: testing_complete
