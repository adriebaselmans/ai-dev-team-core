version: 2
runtime: model-agnostic
top_level_role: coordinator
specialist_dispatch: orchestrator-owned

roles:
  coordinator:
    agent_type: orchestrator
    user_facing: true
    writes:
      - framework/runtime/state.json
      - framework/flows/current-status.md
      - framework/memory/logs/
  requirements-engineer:
    agent_type: specialist
    user_facing: false
    primary_skill: .github/skills/requirements-clarification
    writes:
      - docs/requirements/current.yaml
      - docs/requirements/current.md
  architect:
    agent_type: specialist
    user_facing: false
    primary_skill: .github/skills/architecture-design
    writes:
      - docs/design/current.yaml
      - docs/design/current.md
  developer:
    agent_type: specialist
    user_facing: false
    primary_skill: .github/skills/implementation-clean-code
    supporting_skills:
      - .github/skills/unit-testing
    writes:
      - src/
      - framework/runtime/
      - framework/runtime/tests/
  reviewer:
    agent_type: specialist
    user_facing: false
    primary_skill: .github/skills/code-review
    writes:
      - docs/review/current.yaml
      - docs/review/current.md
  tester:
    agent_type: specialist
    user_facing: false
    primary_skill: .github/skills/acceptance-testing
    writes:
      - docs/dod/current.yaml
      - docs/dod/current.md

shared_tools:
  repository-exploration:
    contract_module: framework/runtime/repository_tool.py
    writes:
      - framework/memory/repository-knowledge/
      - framework/memory/logs/

spawn_rules:
  - Only the coordinator dispatches specialist work.
  - Specialist payloads must be one-shot and built from context slices plus skill contracts.
  - Shared tools may be requested by any phase but are dispatched through the coordinator.
  - Roles may only write owned outputs or explicit shared-tool outputs.
