version: 2
default_host: native-agent-host

hosts:
  native-agent-host:
    kind: native
    primary: true
    capabilities:
      - custom-agents
      - handoffs
      - subagents
    notes:
      - Preferred host class when project-agent profiles are supported.
      - GitHub Copilot in Visual Studio Code is the maintained native profile set for this repo.
      - Use .github/agents/*.agent.md as the native execution surface.
  instruction-file-host:
    kind: instruction-compatible
    primary: false
    capabilities:
      - prompt-layering
      - sub-agents-when-host-supports-them
      - repository-instructions
    notes:
      - Generic fallback host class for tools that read repository instructions.
      - Follow the same role, flow, prompt, and runtime contracts defined for the framework.

roles:
  coordinator:
    primary_host: native-agent-host
    compatible_hosts:
      - instruction-file-host
    agent_profile: .github/agents/coordinator.agent.md
  requirements-engineer:
    primary_host: native-agent-host
    compatible_hosts:
      - instruction-file-host
    agent_profile: .github/agents/requirements-engineer.agent.md
  ux-ui-designer:
    primary_host: native-agent-host
    compatible_hosts:
      - instruction-file-host
    agent_profile: .github/agents/ux-ui-designer.agent.md
  explorer:
    primary_host: native-agent-host
    compatible_hosts:
      - instruction-file-host
    agent_profile: .github/agents/explorer.agent.md
  scout:
    primary_host: native-agent-host
