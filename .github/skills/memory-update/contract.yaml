name: memory-update
description: Update project memory after a completed phase using the repository's logging conventions.
response_mode: one-shot
required_inputs:
  - phase outcome
  - active artifacts in docs/
  - existing structured memory in framework/memory/records/
expected_outputs:
  - framework/memory/records/
owned_artifacts:
  - framework/memory/records/
completion_criteria:
  - New durable memory entries are short, factual, and phase-scoped.
  - Durable memory is written through structured records instead of markdown files.
