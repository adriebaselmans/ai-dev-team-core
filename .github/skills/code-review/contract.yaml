name: code-review
description: Review the implementation for correctness risks, maintainability, and alignment with the approved design.
response_mode: one-shot
required_inputs:
  - docs/requirements/current.md
  - docs/design/current.md
  - framework/clean-code.md
  - framework/runtime/review-template.md
  - relevant implementation and tests in src/
expected_outputs:
  - docs/review/current.md
  - clear decision: approved for testing or rework required
owned_artifacts:
  - docs/review/current.md
completion_criteria:
  - Findings are ordered by severity and include file references where possible.
  - The recommendation clearly states whether testing can proceed.
