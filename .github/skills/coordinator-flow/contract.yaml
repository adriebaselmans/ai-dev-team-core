name: coordinator-flow
description: Run the coordinator phase flow in read-only mode, manage transitions, delegate writes, update memory, and present the final DoD review.
response_mode: one-shot
policy:
  read_only: true
  direct_file_writes: delegated
required_inputs:
  - user request
  - framework/AGENTS.md
  - framework/runtime/team.yaml
  - framework/runtime/workflow.yaml
  - framework/runtime/task-template.md
  - framework/runtime/state.json
  - doc_templates/requirements/current.yaml
  - doc_templates/design/current.yaml
  - doc_templates/review/current.yaml
  - doc_templates/dod/current.yaml
expected_outputs:
  - framework/runtime/state.json
  - framework/memory/records/
  - final user-facing DoD review
owned_artifacts: []
delegated_artifacts:
  - framework/runtime/state.json
  - framework/memory/records/
completion_criteria:
  - Each completed phase is reflected in the status file and structured memory.
  - The user-facing DoD review is ready when the workflow reaches DoD review.
